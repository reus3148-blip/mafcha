<!--
======================================================================
설정 방법 (처음 한 번만)
======================================================================

[1] Supabase 프로젝트 생성
    https://supabase.com → New project (무료)

[2] 아래 두 값 입력
    Settings → API 에서 복사
    - Project URL  →  SUPABASE_URL
    - anon public  →  SUPABASE_ANON_KEY

[3] SQL Editor 에서 아래 전체 복붙 후 Run:

    insert into storage.buckets (id, name, public)
    values ('files', 'files', false)
    on conflict do nothing;

    create policy "own_insert"
    on storage.objects for insert to authenticated
    with check (
      bucket_id = 'files'
      and (storage.foldername(name))[1] = auth.uid()::text
    );

    create policy "own_select"
    on storage.objects for select to authenticated
    using (
      bucket_id = 'files'
      and (storage.foldername(name))[1] = auth.uid()::text
    );

    create policy "own_delete"
    on storage.objects for delete to authenticated
    using (
      bucket_id = 'files'
      and (storage.foldername(name))[1] = auth.uid()::text
    );

[4] Authentication → Providers → Email 활성화
    개인용이면 "Confirm email" OFF 추천

[5] Authentication → Users → Add user 로 본인 계정 생성

[6] 이 HTML 파일 더블클릭해서 열기 (또는 Vercel 등에 배포)
======================================================================
-->

<style>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ============ 여기 두 줄 본인 값으로 바꾸기 ============
const SUPABASE_URL = 'https://hqykjvtjihgyneohkxig.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxeWtqdnRqaWhneW5lb2hreGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTU5NTIsImV4cCI6MjA5NDA5MTk1Mn0.zY4rgXJ-1Fgt6yuQ4cjOLqV3UfRNMu6mEGZv-XgsYzQ';
// ====================================================

const BUCKET = 'files';
const MAX_SIZE = 50 * 1024 * 1024;

// === 장난감 암호화 (XOR cipher) ===
// 의도: Supabase 스토리지 측에 평문이 남지 않도록. 이 HTML 소스가 곧 키이므로
// "암호학적 보안"이 아니라 "스토리지 내용 난독화" 수준.
// 매직 헤더로 암호화 여부를 식별해 기존 미암호화 파일은 그대로 다운로드되도록 함.
const ENC_MAGIC = new Uint8Array([0x4D, 0x46, 0x43, 0x41, 0x01]); // "MFCA" + version 1
const ENC_KEY = new TextEncoder().encode('mafcha-archive-2026-toy-cipher-do-not-trust-for-real-secrets');

function xorTransform(bytes) {
  const out = new Uint8Array(bytes.length);
  const k = ENC_KEY, kl = k.length;
  for (let i = 0; i < bytes.length; i++) out[i] = bytes[i] ^ k[i % kl];
  return out;
}

async function encryptFile(file) {
  const buf = new Uint8Array(await file.arrayBuffer());
  const cipher = xorTransform(buf);
  const wrapped = new Uint8Array(ENC_MAGIC.length + cipher.length);
  wrapped.set(ENC_MAGIC, 0);
  wrapped.set(cipher, ENC_MAGIC.length);
  return new File([wrapped], file.name, { type: 'application/octet-stream' });
}

function hasEncMagic(bytes) {
  if (bytes.length < ENC_MAGIC.length) return false;
  for (let i = 0; i < ENC_MAGIC.length; i++) if (bytes[i] !== ENC_MAGIC[i]) return false;
  return true;
}

async function decryptBlob(blob) {
  const bytes = new Uint8Array(await blob.arrayBuffer());
  if (!hasEncMagic(bytes)) return blob; // 레거시(미암호화) 파일 그대로
  const plain = xorTransform(bytes.subarray(ENC_MAGIC.length));
  return new Blob([plain]);
}

// === 스토리지 키 인코딩 ===
// Supabase 스토리지는 키에 허용 문자가 제한적임 (한글/비ASCII 거부).
// encodeURIComponent 결과의 % 를 = 로 치환 — = 는 허용 문자라 안전.
// ASCII-only 파일명은 그대로 유지되어 기존 업로드 파일과 호환.
function encodeNameForKey(name) {
  return encodeURIComponent(name)
    .replace(/%/g, '=')
    .replace(/~/g, '=7E'); // ~ 는 encodeURIComponent가 안 바꾸지만 Supabase가 안 받음
}
function decodeNameFromKey(encoded) {
  try { return decodeURIComponent(encoded.replace(/=/g, '%')); }
  catch { return encoded; }
}

const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');

let supabase, user;
let currentAccessToken = null; // 탭 닫힐 때 서버 signOut 호출용

if (!SUPABASE_URL.startsWith('http') || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY' || SUPABASE_ANON_KEY.length < 20) {
  show('setup');
} else {
  init();
}

async function init() {
  supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: false, autoRefreshToken: false }
  });
  // 이전 세션 잔여 토큰 청소 (persistSession=false 이전에 저장된 게 남아있을 수 있음)
  try {
    for (const k of Object.keys(localStorage)) {
      if (k.startsWith('sb-') && k.endsWith('-auth-token')) localStorage.removeItem(k);
    }
  } catch {}
  show('login');

  supabase.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') {
      user = null;
      currentAccessToken = null;
      clearIdle();
      hide('app');
      show('login');
    }
  });

  $('loginBtn').onclick = onLogin;
  $('password').onkeydown = e => { if (e.key === 'Enter') onLogin(); };
  $('logoutBtn').onclick = () => supabase.auth.signOut();
  $('fileInput').onchange = e => handleFiles([...e.target.files]);
  $('noteSave').onclick = saveNote;

  setupDragDrop();
  setupPaste();
  setupCrypto();
  setupIdleTracking();
  setupUnloadLogout();
}

// === 탭 닫힘 시 서버 측 토큰 무효화 ===
// pagehide(모바일 Safari/iOS 신뢰) + beforeunload(데스크탑) 양쪽 등록.
// fetch는 keepalive: true 로 unload 중에도 끝까지 송신.
function setupUnloadLogout() {
  const handler = () => {
    if (!user || !currentAccessToken) return;
    try {
      fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST',
        keepalive: true,
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${currentAccessToken}`,
        }
      });
    } catch {}
  };
  window.addEventListener('pagehide', handler);
  window.addEventListener('beforeunload', handler);
}

// === 1분 비활동 자동 로그아웃 ===
const IDLE_TIMEOUT_MS = 60 * 1000;
let idleTimer = null;
let busyCount = 0; // 업로드/다운로드/삭제 진행 중일 땐 타임아웃 무효

function bumpIdle() {
  if (!user) return;
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(onIdleTimeout, IDLE_TIMEOUT_MS);
}

function clearIdle() {
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
}

async function onIdleTimeout() {
  if (busyCount > 0) { bumpIdle(); return; }
  if (!user) return;
  toast('1분간 활동이 없어 로그아웃됐어요');
  await supabase.auth.signOut();
}

function setupIdleTracking() {
  const events = ['mousemove', 'mousedown', 'keydown', 'touchstart', 'touchmove', 'scroll', 'wheel', 'paste', 'input', 'click'];
  events.forEach(ev => document.addEventListener(ev, bumpIdle, { passive: true }));
}

function setupPaste() {
  document.addEventListener('paste', e => {
    if (!user) return;
    const items = [...(e.clipboardData?.items || [])];
    const images = items.filter(it => it.kind === 'file' && it.type.startsWith('image/'));
    if (!images.length) return;
    e.preventDefault();
    const stamp = Date.now();
    const files = images.map((it, i) => {
      const blob = it.getAsFile();
      const ext = (blob.type.split('/')[1] || 'png').split('+')[0];
      const name = `clipboard_${stamp}${images.length > 1 ? '_' + i : ''}.${ext}`;
      return new File([blob], name, { type: blob.type });
    });
    handleFiles(files);
  });
}

// === 텍스트 암호화/복호화 (사용자에게 노출되는 toy XOR + base64) ===
const TXT_KEY = new TextEncoder().encode('mafcha-text-2026-toy-cipher');
let cryptoMode = 'encrypt';

function encryptText(text) {
  if (!text) return '';
  const bytes = new TextEncoder().encode(text);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i] ^ TXT_KEY[i % TXT_KEY.length]);
  return btoa(bin);
}

function decryptText(b64) {
  if (!b64) return '';
  const bin = atob(b64.replace(/\s+/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const plain = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) plain[i] = bytes[i] ^ TXT_KEY[i % TXT_KEY.length];
  return new TextDecoder('utf-8', { fatal: true }).decode(plain);
}

function updateCrypto() {
  const input = $('cryptoInput').value;
  const out = $('cryptoOutput');
  if (!input) { out.value = ''; $('cryptoSave').disabled = true; return; }
  try {
    out.value = cryptoMode === 'encrypt' ? encryptText(input) : decryptText(input);
    $('cryptoSave').disabled = !out.value;
  } catch {
    out.value = '(올바른 형식이 아니에요)';
    $('cryptoSave').disabled = true;
  }
}

function setCryptoMode(mode) {
  if (mode === cryptoMode) return;
  cryptoMode = mode;
  document.querySelectorAll('.crypto-mode button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  const enc = mode === 'encrypt';
  $('cryptoInput').placeholder = enc ? '암호화할 텍스트…' : '암호화된 텍스트(Base64)…';
  $('cryptoOutput').placeholder = enc ? '암호화된 결과가 여기에 나와요' : '복호화된 결과가 여기에 나와요';
  $('cryptoHint').textContent = (enc ? '암호화' : '복호화') + ' → .txt 저장';
  $('cryptoInput').value = '';
  $('cryptoOutput').value = '';
  $('cryptoSave').disabled = true;
}

async function saveCryptoOutput() {
  const text = $('cryptoOutput').value;
  if (!text) return;
  const btn = $('cryptoSave');
  btn.disabled = true;
  const prefix = cryptoMode === 'encrypt' ? 'encrypted' : 'decrypted';
  const file = new File([text], `${prefix}_${Date.now()}.txt`, { type: 'text/plain;charset=utf-8' });
  await handleFiles([file]);
  $('cryptoInput').value = '';
  $('cryptoOutput').value = '';
  btn.disabled = true;
}

function setupCrypto() {
  $('cryptoInput').addEventListener('input', updateCrypto);
  $('cryptoSave').onclick = saveCryptoOutput;
  document.querySelectorAll('.crypto-mode button').forEach(b => {
    b.onclick = () => setCryptoMode(b.dataset.mode);
  });
}

async function saveNote() {
  const ta = $('noteInput');
  const text = ta.value;
  if (!text.trim()) return;
  const firstLine = text.split('\n')[0].slice(0, 40).trim() || 'note';
  const name = `${firstLine}_${Date.now()}.txt`;
  const file = new File([text], name, { type: 'text/plain;charset=utf-8' });
  const btn = $('noteSave');
  btn.disabled = true;
  await handleFiles([file]);
  ta.value = '';
  btn.disabled = false;
}

async function onLogin() {
  const email = $('email').value.trim();
  const password = $('password').value;
  const btn = $('loginBtn');
  const errEl = $('loginErr');
  
  if (!email || !password) {
    errEl.textContent = '이메일과 비밀번호를 입력해주세요';
    show('loginErr');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '로그인 중...';
  errEl.classList.add('hidden');
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = '로그인';

  if (error) {
    errEl.textContent = '로그인 실패: ' + (error.message.includes('Invalid') ? '이메일 또는 비밀번호가 잘못되었습니다' : error.message);
    show('loginErr');
    return;
  }

  currentAccessToken = data.session?.access_token || null;
  enterApp(data.user);
}

function enterApp(u) {
  user = u;
  hide('login');
  hide('setup');
  show('app');
  bumpIdle();
  loadFiles();
}

async function loadFiles() {
  const { data, error } = await supabase
    .storage
    .from(BUCKET)
    .list(user.id, {
      limit: 200,
      sortBy: { column: 'created_at', order: 'desc' }
    });
  
  if (error) {
    toast('파일 목록을 불러오지 못했어요: ' + error.message, true);
    return;
  }
  
  renderFiles(data || []);
}

function renderFiles(files) {
  const list = $('fileList');
  $('fileCount').textContent = files.length + ' 개';
  
  if (files.length === 0) {
    list.innerHTML = '<div class="empty">아직 올린 파일이 없어요</div>';
    return;
  }
  
  list.innerHTML = files.map(f => {
    const displayName = decodeNameFromKey(f.name.replace(/^\d{13}_/, ''));
    const size = formatSize(f.metadata?.size || 0);
    const date = formatDate(f.created_at);
    return `
      <div class="file">
        <div class="file-info">
          <div class="file-name" title="${escape(displayName)}">${escape(displayName)}</div>
          <div class="file-sub">${size}<span class="dot">·</span>${date}</div>
        </div>
        <div class="file-actions">
          <button class="icon-btn" data-action="download" data-name="${escape(f.name)}" data-display="${escape(displayName)}" title="다운로드">↓</button>
          <button class="icon-btn" data-action="rename" data-name="${escape(f.name)}" data-display="${escape(displayName)}" title="이름 변경">✎</button>
          <button class="icon-btn danger" data-action="delete" data-name="${escape(f.name)}" title="삭제">×</button>
        </div>
      </div>
    `;
  }).join('');
  
  list.querySelectorAll('button[data-action]').forEach(btn => {
    btn.onclick = () => {
      const { action, name, display } = btn.dataset;
      if (action === 'download') downloadFile(name, display);
      else if (action === 'rename') renameFile(name, display, btn);
      else if (action === 'delete') deleteFile(name, display || name);
    };
  });
}

async function handleFiles(files) {
  if (!files.length) return;

  const oversized = files.filter(f => f.size > MAX_SIZE);
  if (oversized.length) {
    toast(`${oversized[0].name} 은(는) 50MB를 넘어요`, true);
    return;
  }

  const prog = $('progress');
  show('progress');
  busyCount++;

  let ok = 0, fail = 0;
  try {
    for (const file of files) {
      prog.textContent = `업로드 중 (${ok + fail + 1}/${files.length}) · ${file.name}`;
      const safeName = encodeNameForKey(file.name);
      const path = `${user.id}/${Date.now()}_${safeName}`;
      const encrypted = await encryptFile(file);
      const { error } = await supabase.storage.from(BUCKET).upload(path, encrypted, { upsert: false });
      if (error) {
        console.error('[upload]', file.name, error);
        toast(`업로드 실패 (${file.name}): ${error.message || error.name || '알 수 없는 오류'}`, true);
        fail++;
      } else {
        ok++;
      }
    }
  } finally {
    busyCount = Math.max(0, busyCount - 1);
    bumpIdle();
  }

  hide('progress');
  $('fileInput').value = '';
  toast(fail ? `${ok}개 업로드 · ${fail}개 실패` : `${ok}개 업로드 완료`, fail > 0 && ok === 0);
  loadFiles();
}

async function downloadFile(name, displayName) {
  const path = `${user.id}/${name}`;
  busyCount++;
  try {
    const { data, error } = await supabase.storage.from(BUCKET).download(path);
    if (error) {
      toast('다운로드 실패: ' + error.message, true);
      return;
    }
    const plain = await decryptBlob(data);
    const url = URL.createObjectURL(plain);
    const a = document.createElement('a');
    a.href = url;
    a.download = displayName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } finally {
    busyCount = Math.max(0, busyCount - 1);
    bumpIdle();
  }
}

async function renameFile(name, displayName, btn) {
  const fileEl = btn.closest('.file');
  if (!fileEl || fileEl.querySelector('.rename-input')) return;
  const nameEl = fileEl.querySelector('.file-name');
  if (!nameEl) return;

  const input = document.createElement('input');
  input.type = 'text';
  input.value = displayName;
  input.className = 'rename-input';
  nameEl.replaceWith(input);
  input.focus();
  const dot = displayName.lastIndexOf('.');
  if (dot > 0) input.setSelectionRange(0, dot); else input.select();

  let done = false;
  const restore = () => {
    if (!input.isConnected) return;
    input.replaceWith(nameEl);
  };
  const commit = async () => {
    if (done) return;
    const trimmed = input.value.trim();
    if (!trimmed || trimmed === displayName) {
      done = true;
      restore();
      return;
    }
    done = true;

    const prefixMatch = name.match(/^(\d{13}_)/);
    const prefix = prefixMatch ? prefixMatch[1] : '';
    const safeNew = encodeNameForKey(trimmed);
    const newName = prefix + safeNew;

    const oldPath = `${user.id}/${name}`;
    const newPath = `${user.id}/${newName}`;

    busyCount++;
    try {
      const { error } = await supabase.storage.from(BUCKET).move(oldPath, newPath);
      if (error) {
        toast('이름 변경 실패: ' + error.message, true);
        restore();
        return;
      }
      toast('이름이 변경됐어요');
      loadFiles();
    } finally {
      busyCount = Math.max(0, busyCount - 1);
      bumpIdle();
    }
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); done = true; restore(); }
  });
  input.addEventListener('blur', commit);
}

async function deleteFile(name, displayName) {
  if (!confirm(`"${displayName}" 을(를) 삭제할까요?`)) return;

  const path = `${user.id}/${name}`;
  busyCount++;
  try {
    const { error } = await supabase.storage.from(BUCKET).remove([path]);
    if (error) {
      toast('삭제 실패: ' + error.message, true);
      return;
    }
    toast('삭제됨');
    loadFiles();
  } finally {
    busyCount = Math.max(0, busyCount - 1);
    bumpIdle();
  }
}

function setupDragDrop() {
  const zone = $('uploadZone');
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev =>
    zone.addEventListener(ev, e => {
      e.preventDefault();
      zone.classList.toggle('drag', ev === 'dragenter' || ev === 'dragover');
      if (ev === 'drop') {
        const files = [...(e.dataTransfer?.files || [])];
        if (files.length) handleFiles(files);
      }
    })
  );
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) {
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('ko-KR', { year: '2-digit', month: '2-digit', day: '2-digit' }).replace(/\.\s?/g, '.').replace(/\.$/, '');
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let toastTimer;
function toast(msg, isError) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
